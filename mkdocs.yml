site_name: envmaker
site_description: Generate .env files from your Bitwarden vault
repo_url: https://github.com/yourusername/mybitwarden
repo_name: mybitwarden

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.annotate
    - content.code.copy

nav:
  - Home: index.md
  - Bitwarden Basics: bw.md
  - Getting Started: getting-started.md
  - Commands: commands.md
  - Configuration: configuration.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/mybitwarden

site_name: envmaker
site_description: Generate .env files from your Bitwarden vault
repo_url: https://github.com/yourusername/mybitwarden
repo_name: mybitwarden

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.instant
    - navigation.footer 

nav:
  - Home: index.md
  - Bitwarden Basics: bw.md
  - Getting Started: getting-started.md
  - Commands: commands.md
  - Configuration: configuration.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/mybitwarden